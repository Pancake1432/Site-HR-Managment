<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LogoPaks.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#667eea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>HR Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* Loading screen — visible until React mounts and removes it */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #0f1117;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }

      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        font-size: 40px;
        animation: pulse 1.6s ease-in-out infinite;
      }

      .loader-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: #e2e8f0;
        letter-spacing: 0.02em;
      }

      .loader-subtitle {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 13px;
        color: #64748b;
        margin-top: -12px;
      }

      .loader-bar-track {
        width: 180px;
        height: 3px;
        background: #1e293b;
        border-radius: 99px;
        overflow: hidden;
        margin-top: 8px;
      }

      .loader-bar-fill {
        height: 100%;
        width: 40%;
        border-radius: 99px;
        background: linear-gradient(90deg, #667eea, #764ba2);
        animation: slide 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1);   opacity: 1; }
        50%       { transform: scale(1.1); opacity: 0.8; }
      }

      @keyframes slide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(150%);  }
        100% { transform: translateX(350%);  }
      }
    </style>
  </head>
  <body>

    <!-- Loading screen: shown instantly while React bundle downloads -->
    <div id="app-loading">
      <div class="loader-logo">🚚</div>
      <div class="loader-title">HR Manager</div>
      <div class="loader-subtitle">Paks Logistic LLC</div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Remove the loading screen once React has rendered the first frame
      (function () {
        const el = document.getElementById('app-loading');
        if (!el) return;

        const observer = new MutationObserver(function () {
          if (document.getElementById('root').childElementCount > 0) {
            el.classList.add('fade-out');
            setTimeout(function () { el.remove(); }, 380);
            observer.disconnect();
          }
        });

        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>

  </body>
</html>
